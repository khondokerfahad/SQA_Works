[pytest]

python_files = test_*.py
python_classes = Test*
python_functions = test_*

pythonpath = src tests

addopts = 
    -v
    --tb=short
    --strict-markers
    --html=reports/test_report.html
    --self-contained-html

markers =
    smoke: Smoke tests (critical functionality)
    regression: Full regression suite
    edge: Edge case tests